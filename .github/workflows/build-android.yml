name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Signed Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v2-

      - name: Generate keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -genkeypair \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storetype PKCS12 \
            -keystore ballfights.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -dname "CN=Devon Goodman, OU=Dev, O=DevonGoodman, L=Unknown, ST=Unknown, C=US"

      - name: Build release with Buildozer Docker
        run: |
          docker run --rm \
            --entrypoint bash \
            -v "$PWD":/home/user/hostcwd \
            kivy/buildozer:latest \
            -c "git config --global --add safe.directory '*' && cd /home/user/hostcwd && P4A_DIR=/home/user/hostcwd/.buildozer/android/platform/python-for-android && if [ -d \"\$P4A_DIR/.git\" ]; then git -C \"\$P4A_DIR\" remote get-url origin >/dev/null 2>&1 || git -C \"\$P4A_DIR\" remote add origin https://github.com/kivy/python-for-android.git 2>/dev/null || true; fi && yes | buildozer -v android release"

      - name: Sign release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Fix permissions (Docker creates files as root)
          sudo chown -R runner:runner bin/
          echo "Contents of bin/:"
          ls -la bin/

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          # Sign AAB if present (Google Play prefers AAB)
          AAB=$(find bin -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            echo "Signing AAB: $AAB"
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore ballfights.keystore \
              -storepass "$KEYSTORE_PASSWORD" \
              "$AAB" "$KEY_ALIAS"
            cp "$AAB" bin/ballfights-release.aab
            echo "AAB signed successfully!"
          fi

          # Sign APK if present
          APK=$(find bin -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "Signing APK: $APK"
            "${BUILD_TOOLS}apksigner" sign \
              --ks ballfights.keystore \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEYSTORE_PASSWORD" \
              --out bin/ballfights-release.apk \
              "$APK"
            "${BUILD_TOOLS}apksigner" verify bin/ballfights-release.apk
            echo "APK signed successfully!"
          fi

      - name: Upload signed release
        uses: actions/upload-artifact@v4
        with:
          name: ball-fights-release
          path: |
            bin/ballfights-release.aab
            bin/ballfights-release.apk
