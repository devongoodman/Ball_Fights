name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Build with Buildozer Docker
        run: |
          docker run --rm \
            -v "$PWD":/home/user/hostcwd \
            -v "$PWD/.buildozer":/home/user/hostcwd/.buildozer \
            kivy/buildozer:latest \
            bash -c "cd /home/user/hostcwd && yes | buildozer -v android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ball-fights-apk
          path: bin/*.apk
